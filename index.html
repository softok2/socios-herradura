<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="App Club de Golf Herradura.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Club de Golf Herradura">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Club de Golf Herradura</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Pre-cargamos los módulos del Firebase JS SDK para evitar el dynamic import()
    de firebase_core_web, que falla de forma intermitente en Safari.
    Ver firebase_core_web:_initializeCore (salta su loader si ya existen).
  -->
  <script type="module">
    import * as fbCore from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
    import * as fbMessaging from "https://www.gstatic.com/firebasejs/12.3.0/firebase-messaging.js";
    window.firebase_core = fbCore;
    window.firebase_messaging = fbMessaging;
    window.dispatchEvent(new Event('firebase-sdks-ready'));
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker
            .register('firebase-messaging-sw.js', {
              scope: '/firebase-cloud-messaging-push-scope',
            })
            .then(function () {
              console.log('Firebase Messaging service worker registrado');
            })
            .catch(function (error) {
              console.error(
                'Error registrando firebase-messaging-sw.js:',
                error,
              );
            });
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
